# Render Blueprint — deploy backend first, then frontend.
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend API (Node/Express) ──────────────────────────────────────────────
  - type: web
    name: ai-mock-interview-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: CLIENT_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: GROQ_WHISPER_MODEL
        value: whisper-large-v3
      - key: GROQ_CHAT_MODEL
        value: llama-3.1-8b-instant
      - key: MAX_AUDIO_BYTES
        value: "8388608"
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false

  # ── Frontend (React/Vite static site) ───────────────────────────────────────
  - type: web
    name: ai-mock-interview-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_API_URL
        sync: false
